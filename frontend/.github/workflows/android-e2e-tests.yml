name: Android E2E Appium Tests

on:
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Run Appium E2E Tests
    # ubuntu-latest has KVM support and starts immediately (no queue like macos-13)
    runs-on: ubuntu-latest

    steps:
      # ── 0. Enable KVM hardware acceleration for Android Emulator ──────────
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 1. Checkout both repos ────────────────────────────────────────────
      - name: Checkout Nutrixa Frontend Repository
        uses: actions/checkout@v4

      - name: Checkout PONIS Root Repository (Android + Backend + Tests)
        uses: actions/checkout@v4
        with:
          repository: KPooja10/PONIS-
          path: ponis

      # ── 2. Java & Android setup ───────────────────────────────────────────
      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('ponis/android/**/*.gradle*', 'ponis/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      # ── 3. Node.js & Backend ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'ponis/backend/package-lock.json'

      - name: Install & Start Backend Service
        run: |
          cd ponis/backend
          npm ci
          nohup npm run dev > /tmp/backend.log 2>&1 &
          echo "Backend PID: $!"
          sleep 3
          echo "=== Backend log ==="
          cat /tmp/backend.log || true
        env:
          PORT: 5000

      # ── 4. Python & Appium ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ponis/appium_tests/requirements.txt'

      - name: Install Python Dependencies
        run: |
          cd ponis/appium_tests
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Appium & UiAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2
          nohup appium --port 4723 --log-level info > /tmp/appium.log 2>&1 &
          echo "Waiting for Appium server to be ready..."
          sleep 8

      # ── 5. Build APK & Run Tests in Emulator (Linux + KVM) ───────────────
      - name: Build APK & Run E2E + Security Tests in Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "=== Emulator is ready ==="

            # ADB port forwarding: emulator → runner host backend on port 5000
            adb reverse tcp:5000 tcp:5000
            echo "ADB reverse port forwarding set up"

            # Build & install the debug APK
            echo "=== Building APK ==="
            cd ponis/android
            chmod +x gradlew
            ./gradlew assembleDebug --stacktrace

            echo "=== Installing APK on emulator ==="
            adb install -r app/build/outputs/apk/debug/app-debug.apk

            # Run the full Appium E2E + Security test suite
            echo "=== Running Appium E2E & Security Tests ==="
            cd ../appium_tests
            export PYTHONIOENCODING="utf-8"
            python -m pytest tests/ -v --tb=short --no-header -rA \
              --junit-xml=reports/junit-results.xml

      # ── 6. Upload all test artifacts ──────────────────────────────────────
      - name: Upload Test Artifacts (Reports, Screenshots & JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-e2e-security-test-results
          path: |
            ponis/appium_tests/reports/
            ponis/appium_tests/screenshots/
          if-no-files-found: warn

      # ── 7. Print logs on failure for debugging ────────────────────────────
      - name: Print Backend Log (on failure)
        if: failure()
        run: cat /tmp/backend.log || true

      - name: Print Appium Log (on failure)
        if: failure()
        run: cat /tmp/appium.log || true
