name: ⚡ Load & Performance Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  load-test:
    name: ⚡ k6 API Performance Benchmarking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install & Start Backend Service
        run: |
          cd backend
          npm ci
          npm run dev &
          echo "Waiting for backend service to boot on port 5000..."
          for i in {1..15}; do
            curl -s http://localhost:5000/health && exit 0
            sleep 2
          done
          echo "⚠️ Backend failed to respond to health check"
          exit 1
        env:
          PORT: 5000

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: backend/tests/load-test.js
        env:
          API_BASE_URL: http://localhost:5000

      - name: Append k6 metrics to GHA Summary
        if: always()
        run: |
          if [ -f load-test-summary.md ]; then
            cat load-test-summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ load-test-summary.md not found" >> $GITHUB_STEP_SUMMARY
          fi
