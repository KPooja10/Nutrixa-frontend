name: Android E2E Appium Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: Run Appium E2E Tests
    runs-on: macos-13 # macOS runner is required for hardware-accelerated Android emulation

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install & Start Backend Service
        run: |
          cd backend
          npm ci
          npm run dev &
        env:
          PORT: 5000

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'appium_tests/requirements.txt'

      - name: Install Python Dependencies
        run: |
          cd appium_tests
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Appium & UiAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium --port 4723 --log-level info &
          echo "Waiting for Appium server..."
          sleep 5

      - name: Run E2E Tests in Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Set up ADB port forwarding to map the emulator's localhost:5000 requests to the runner host
            adb reverse tcp:5000 tcp:5000
            
            # Compile the debug APK
            cd android
            chmod +x gradlew
            ./gradlew assembleDebug
            
            # Go to appium tests and run pytest
            cd ../appium_tests
            export PYTHONIOENCODING="utf-8"
            python -m pytest tests/ -v --tb=short --no-header -rA

      - name: Upload Test Artifacts (Excel Report & Screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-results
          path: |
            appium_tests/reports/
            appium_tests/screenshots/
          if-no-files-found: warn
